name: Test Suite

# Run tests on pull requests only.
# Pushes to main / prod are gated by the publish workflows
# (npm-publish.yml, npm-publish-stable.yml), which run their own
# build + test + e2e before publishing.
on:
  pull_request:
    branches: [ main, prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm test
        env:
          CI: true

      - name: Build Package
        run: npm run build

      - name: Verify Package Contents
        run: npm pack --dry-run

      - name: Test Results Summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ All tests passed successfully!"
            echo "📦 Package builds correctly"
            echo "🔍 Type checking passed"
            echo "🧪 Test suite completed"
          else
            echo "❌ Some tests failed"
            echo "Please fix the failing tests before merging"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 4 shards in parallel — Playwright splits tests evenly across them.
        # ubuntu-latest is 2 vCPU; more shards beats more workers on a single runner.
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Get Playwright Version
        id: playwright-version
        # Read the actually-installed version from the installed package, not
        # from package.json's devDependencies (which carries the caret range
        # "^1.58.2", a bad cache key).
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # Always install OS deps (apt). Idempotent — packages already present
      # on ubuntu-latest are skipped; only a few small font packages are added.
      - name: Install Playwright OS Deps
        timeout-minutes: 5
        run: npx playwright install-deps chromium

      # Install the browser binary only on cache miss. Note: NOT --with-deps —
      # OS deps are handled above. Bundling them into this step previously
      # hung silently after the Chromium download until the 6h job timeout.
      - name: Install Playwright Browser (chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: npx playwright install chromium

      - name: Build Package
        run: npm run build

      - name: Run E2E Tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4
        env:
          CI: true

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7