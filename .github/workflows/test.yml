name: Test Suite

# Run tests on pull requests only.
# Pushes to main / prod are gated by the publish workflows
# (npm-publish.yml, npm-publish-stable.yml), which run their own
# build + test + e2e before publishing.
on:
  pull_request:
    branches: [ main, prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
        # Test against every React major in the declared peer range (^18 || ^19)
        react-version: [18, 19]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install React ${{ matrix.react-version }}
        if: matrix.react-version != 19
        run: npm install --no-save react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }}

      - name: Run Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm test
        env:
          CI: true

      - name: Build Package
        run: npm run build

      - name: Verify Package Contents
        run: npm pack --dry-run

      - name: Test Results Summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ All tests passed successfully!"
            echo "📦 Package builds correctly"
            echo "🔍 Type checking passed"
            echo "🧪 Test suite completed"
          else
            echo "❌ Some tests failed"
            echo "Please fix the failing tests before merging"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true