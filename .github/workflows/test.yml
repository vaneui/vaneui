name: Test Suite

# Run tests on pull requests only.
# Pushes to main / prod are gated by the publish workflows
# (npm-publish.yml, npm-publish-stable.yml), which run their own
# build + test + e2e before publishing.
on:
  pull_request:
    branches: [ main, prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npm run type-check

      - name: Run Tests
        run: npm test
        env:
          CI: true

      - name: Build Package
        run: npm run build

      - name: Verify Package Contents
        run: npm pack --dry-run

      - name: Test Results Summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ All tests passed successfully!"
            echo "📦 Package builds correctly"
            echo "🔍 Type checking passed"
            echo "🧪 Test suite completed"
          else
            echo "❌ Some tests failed"
            echo "Please fix the failing tests before merging"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    # Run each shard inside Microsoft's official Playwright container so the
    # browsers are pre-installed at /ms-playwright. The in-place `playwright
    # install` step was hanging silently after the Chromium download
    # completed (see npm-publish.yml history for the failing runs that drove
    # this switch). Pinned to the same version as @playwright/test.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      # Run as root — avoids cross-user permission issues between the runner
      # workspace owner (uid 1001) and the image's default pwuser (uid 1000).
      options: --user 0
    strategy:
      fail-fast: false
      matrix:
        # 4 shards in parallel — Playwright splits tests evenly across them.
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Run E2E Tests (shard ${{ matrix.shard }}/4)
        timeout-minutes: 15
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
        run: npx playwright test --shard=${{ matrix.shard }}/4

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7