name: Publish Stable Release to npm

# Run on pushes to the prod branch
on:
  push:
    branches:
      - prod

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # contents: write — required to push the version tag and create the GitHub release
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
        env:
          CI: true

      - name: Check Test Results
        if: failure()
        run: |
          echo "❌ Tests failed! Cannot proceed with stable release publication."
          echo "Please fix the failing tests before merging to prod branch."
          exit 1

      # Check if the version in package.json already exists on npm
      - name: Check if Version is Already Published
        id: check_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PUBLISHED_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "none")
          echo "Local version: $VERSION"
          echo "Published version: $PUBLISHED_VERSION"
          if [ "$VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $VERSION is already published. Skipping."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new. Proceeding to publish."
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      # Fail fast if the npm token is missing/expired/lacks publish rights for
      # @vaneui/ui — npm publish on a bad token returns a misleading 404
      # instead of 401, which is hard to diagnose. npm whoami fails clearly.
      - name: Verify npm Auth
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          npm whoami
          echo "✅ npm auth OK"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Proceed only if the version is new
      - name: Build Package
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm run build

      - name: Check Build Result
        if: steps.check_version.outputs.should_publish == 'true' && failure()
        run: |
          echo "❌ Build failed!"
          echo "Cannot proceed with stable release publication."
          exit 1

      - name: Install Playwright Browsers
        if: steps.check_version.outputs.should_publish == 'true'
        # All three engines: test:e2e runs the firefox/webkit behavior projects too
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E Tests
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm run test:e2e
        env:
          CI: true

      # Best Practice: Verify what will be in the package before publishing
      - name: Verify Package Contents
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm pack --dry-run

      # Validate the published package shape: exports map targets must exist
      # (publint) and the shipped types must resolve under every TypeScript
      # moduleResolution mode, including node16/nodenext (attw).
      - name: Validate Package Exports and Types
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          npx publint
          npx --yes @arethetypeswrong/cli --pack .

      - name: Publish Stable Package to npm
        # --ignore-scripts: this workflow already ran build + test + test:e2e
        # above (the same gate as the `prepublishOnly` script in package.json),
        # so re-running it during publish would only duplicate work.
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag the published commit and create a GitHub release so every npm
      # version maps to a commit (RELEASE_PROCESS.md documents this step).
      - name: Create Git Tag and GitHub Release
        if: steps.check_version.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.check_version.outputs.version }}
          git tag "v$VERSION" "$GITHUB_SHA"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes

      - name: Report Success
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          echo "✅ Stable release published successfully!"
          echo "📦 Version: ${{ steps.check_version.outputs.version }}"
          echo "🏷️  Tag: latest"
          echo "📥 Install with: npm install @vaneui/ui@latest"
